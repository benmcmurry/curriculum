<script>
document.addEventListener("DOMContentLoaded", function () {
    function syncEditorHeaderOffset() {
        var header = document.getElementById("header");
        if (!header) {
            return;
        }
        document.documentElement.style.setProperty("--editor-header-offset", header.offsetHeight + "px");
    }
    syncEditorHeaderOffset();
    window.addEventListener("resize", syncEditorHeaderOffset);
});
</script>
